<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <title>Panel – Baza wiedzy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <div class="admin-layout">
      <aside class="admin-sidebar">
        <h1>Twoja Firma CMS</h1>
        <nav class="admin-menu">
          <a href="/admin/dashboard.html">Przegląd</a>
          <a href="/admin/faq.html">FAQ</a>
          <a href="/admin/blog.html">Blog</a>
          <a href="/admin/kb.html">Baza wiedzy</a>
          <a href="#" id="logout-link">Wyloguj</a>
        </nav>
      </aside>
      <main class="admin-main">
        <div class="admin-card">
          <h2 style="margin-top:0">Baza wiedzy</h2>
          <p style="margin-top:0;margin-bottom:1rem;font-size:0.9rem;color:#9ca3af">
            Artykuły pomocy i instrukcje dla klientów.
          </p>

          <form id="kb-form" style="margin-bottom:1.25rem">
            <input type="hidden" id="kb-id" />
            <div class="field">
              <label for="kb-title">Tytuł</label>
              <input id="kb-title" type="text" />
            </div>
            <div class="field">
              <label for="kb-slug">Slug (adres URL)</label>
              <input id="kb-slug" type="text" />
            </div>
            <div class="field">
              <label for="kb-category">Kategoria</label>
              <input id="kb-category" type="text" />
            </div>
            <div class="field">
              <label for="kb-content">Treść (HTML)</label>
              <textarea id="kb-content" data-rich-editor rows="14"></textarea>
            </div>
            <div class="field-inline" style="margin-bottom:0.75rem">
              <input id="kb-published" type="checkbox" checked />
              <label for="kb-published">Opublikuj (widoczne w serwisie)</label>
            </div>
            <div class="field-inline" style="margin-bottom:0.75rem">
              <input id="kb-on-home" type="checkbox" />
              <label for="kb-on-home">Pokaż na stronie głównej</label>
            </div>
            <button class="btn btn-primary" type="submit">Zapisz</button>
            <button class="btn btn-secondary" type="button" id="kb-reset">
              Wyczyść formularz
            </button>
          </form>

          <table class="admin-table" id="kb-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Tytuł</th>
                <th>Kategoria</th>
                <th>Slug</th>
                <th>Status</th>
                <th>Strona główna</th>
                <th>Akcje</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </main>
    </div>
    <script src="/js/admin-auth-guard.js"></script>
    <script src="/js/admin-rich-editor.js"></script>
    <script src="/js/admin-kb.js"></script>
  </body>
  </html>
